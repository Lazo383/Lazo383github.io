<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Espacio</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080810;
    --card: #10101e;
    --border: #ffffff12;
    --accent1: #ff6ec7;
    --accent2: #a78bfa;
    --accent3: #60d9fa;
    --text: #f0eeff;
    --muted: #6b6b8a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Fondo animado */
  .bg-grid {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }
  .bg-glow {
    position: fixed;
    width: 600px; height: 600px;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
    z-index: 0;
    opacity: 0.18;
  }
  .bg-glow.one { background: var(--accent2); top: -200px; left: -200px; }
  .bg-glow.two { background: var(--accent1); bottom: -200px; right: -200px; }

  /* Contenido */
  .container {
    position: relative;
    z-index: 1;
    max-width: 720px;
    margin: 0 auto;
    padding: 60px 24px 80px;
  }

  /* Header */
  header {
    margin-bottom: 60px;
    animation: fadeUp 0.8s ease both;
  }
  .tag {
    display: inline-block;
    font-size: 0.7em;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent3);
    border: 1px solid var(--accent3);
    padding: 4px 12px;
    border-radius: 99px;
    margin-bottom: 20px;
  }
  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2.4em, 8vw, 4em);
    font-weight: 800;
    line-height: 1.1;
    background: linear-gradient(135deg, var(--text) 0%, var(--accent2) 60%, var(--accent1) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 16px;
  }
  .subtitle {
    color: var(--muted);
    font-size: 0.85em;
    line-height: 1.7;
    max-width: 480px;
  }
  .subtitle span {
    color: var(--accent1);
    -webkit-text-fill-color: var(--accent1);
  }

  /* Sección */
  .section-label {
    font-size: 0.68em;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Cards de proyectos */
  .projects {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-bottom: 60px;
  }

  .card {
    display: flex;
    align-items: center;
    gap: 20px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px 26px;
    text-decoration: none;
    color: var(--text);
    transition: border-color 0.25s, transform 0.2s, box-shadow 0.25s;
    animation: fadeUp 0.8s ease both;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.3s;
    background: linear-gradient(135deg, var(--accent2)08, var(--accent1)08);
  }
  .card:hover {
    border-color: var(--accent2);
    transform: translateY(-3px);
    box-shadow: 0 12px 40px #a78bfa22;
  }
  .card:hover::before { opacity: 1; }

  .card-icon {
    font-size: 2em;
    width: 56px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #ffffff08;
    border-radius: 12px;
    flex-shrink: 0;
  }
  .card-info { flex: 1; }
  .card-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.05em;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .card-desc {
    color: var(--muted);
    font-size: 0.75em;
    line-height: 1.5;
  }
  .card-arrow {
    color: var(--accent2);
    font-size: 1.2em;
    opacity: 0;
    transform: translateX(-6px);
    transition: opacity 0.2s, transform 0.2s;
  }
  .card:hover .card-arrow { opacity: 1; transform: translateX(0); }

  /* Badge "Nuevo" */
  .badge {
    font-size: 0.6em;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: linear-gradient(135deg, var(--accent1), var(--accent2));
    color: #fff;
    padding: 2px 8px;
    border-radius: 99px;
    margin-left: 8px;
    vertical-align: middle;
  }

  /* Delays */
  .card:nth-child(1) { animation-delay: 0.1s; }
  .card:nth-child(2) { animation-delay: 0.2s; }
  .card:nth-child(3) { animation-delay: 0.3s; }
  .card:nth-child(4) { animation-delay: 0.4s; }

  /* Footer */
  footer {
    color: var(--muted);
    font-size: 0.7em;
    text-align: center;
    letter-spacing: 1px;
    animation: fadeUp 1s ease 0.5s both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow one"></div>
<div class="bg-glow two"></div>

<div class="container">

  <header>
    <div class="tag">✦ Mi espacio en internet</div>
    <h1>Hola, soy<br>tunombre.</h1>
    <p class="subtitle">
      Aquí guardo mis proyectos, experimentos y cosas que hago por diversión.<br>
      <span>Explora lo que hay por acá.</span>
    </p>
  </header>

  <div class="section-label">Proyectos</div>

  <div class="projects">

    <a href="pendulo.html" class="card">
      <div class="card-icon">⚙️</div>
      <div class="card-info">
        <div class="card-title">Simulador de Péndulo <span class="badge">Nuevo</span></div>
        <div class="card-desc">Simulación física con controles de longitud, gravedad y fricción.</div>
      </div>
      <div class="card-arrow">→</div>
    </a>

    <!-- Agrega más proyectos aquí copiando el bloque de arriba -->
    <!-- Ejemplo:
    <a href="otrojuego.html" class="card">
      <div class="card-icon">🎮</div>
      <div class="card-info">
        <div class="card-title">Otro Juego</div>
        <div class="card-desc">Descripción del juego.</div>
      </div>
      <div class="card-arrow">→</div>
    </a>
    -->

  </div>

  <footer>Hecho por tunombre &mdash; tunombre.github.io</footer>

</div>
</body>
</html>
